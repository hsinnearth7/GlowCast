service: "service:GlowCastService"
labels:
  owner: glowcast-team
  project: glowcast
  stage: production
include:
  - "*.py"
  - "app/**/*.py"
  - "configs/*.yaml"
python:
  packages:
    - pandas>=2.2.0
    - numpy>=1.26.0
    - scipy>=1.12.0
    - scikit-learn>=1.4.0
    - lightgbm>=4.0.0
    - xgboost>=2.0.0
    - pyyaml>=6.0
    - structlog>=23.0.0
    - bentoml>=1.2.0
docker:
  system_packages:
    - libgomp1
  env:
    PYTHONUNBUFFERED: "1"
    GLOWCAST_ENV: "production"
    PYTHONHASHSEED: "42"
