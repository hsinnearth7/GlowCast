# GlowCast — Cost & Commercial Analytics Configuration
# =====================================================

data:
  n_skus: 500
  n_days: 1095           # 3 years
  start_date: "2022-01-01"
  n_plants: 12
  n_suppliers: 5
  n_commodities: 5
  countries: ["CN", "TW", "DE", "US", "MX", "IN", "JP"]

segments:
  categories: ["RawMaterials", "Components", "Packaging", "Labor", "Overhead"]
  cost_tiers: ["Direct", "Indirect"]

cost:
  should_cost:
    gap_threshold: 0.10           # Flag SKUs with >10% cost gap
    decomposition_elements:
      - raw_material
      - labor
      - overhead
      - logistics
      - tariff
  ocogs:
    variance_threshold: 0.05      # 5% cost variance alert
    trend_lookback_months: 12
    outlier_z_threshold: 2.5
  cost_reduction:
    min_projected_savings: 0.02   # 2% minimum to consider
    realization_target: 0.80      # 80% realization rate target
  make_vs_buy:
    default_weights:
      cost: 0.35
      quality: 0.30
      lead_time: 0.20
      strategic: 0.15
    recommendation_threshold: 1.05  # 5% advantage needed for clear recommendation

pricing:
  elasticity:
    min_observations: 5
    significance_level: 0.05
    default_markup: 0.30

experimentation:
  cuped:
    target_rho: 0.74
    variance_reduction_target: 0.55
    mde_levels: [0.03, 0.05, 0.10]
  sequential:
    alpha: 0.05
    beta: 0.20
    msprt_h: 2.0
  power:
    target_power: 0.80
    alpha: 0.05
    min_effect_size: 0.03

causal:
  dowhy:
    estimand_type: "ate"
    method_name: "backdoor.linear_regression"
    ci_alpha: 0.05
    refute_methods:
      - random_common_cause
      - placebo_treatment_refuter
      - data_subset_refuter
  uplift:
    treatment_ratio: 0.20
    meta_learners: ["s_learner", "t_learner", "x_learner", "causal_forest"]
    target_auuc: 0.74
    n_bootstrap: 500

monitoring:
  drift:
    ks_alpha: 0.05
    psi_alert: 0.10
    psi_retrain: 0.20
    cost_mape_threshold: 0.15
  retrain:
    check_interval_hours: 6
    min_samples_since_last: 1000
    auto_retrain_on_psi: true

sql:
  cost_variance:
    granularity: "plant_category"
    period: "monthly"
  should_cost_gap:
    threshold: 0.10
  supplier_performance:
    metrics: ["on_time_pct", "quality_score", "cost_competitiveness"]
  cost_anomaly:
    z_threshold: 3.0
    lookback_days: 90
