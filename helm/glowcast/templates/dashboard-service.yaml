apiVersion: v1
kind: Service
metadata:
  name: {{ include "glowcast.fullname" . }}-dashboard
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "glowcast.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: {{ .Values.dashboard.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "glowcast.dashboard.selectorLabels" . | nindent 4 }}
