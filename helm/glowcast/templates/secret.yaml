apiVersion: v1
kind: Secret
metadata:
  name: {{ include "glowcast.secretName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "glowcast.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
