services:
  analytics:
    build: .
    container_name: glowcast-analytics
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
      - GLOWCAST_ENV=production
    command: ["python", "-m", "app.data.data_generator"]

  api:
    build: .
    container_name: glowcast-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
      - GLOWCAST_ENV=production
      - API_KEY=${API_KEY:-changeme-dev}
      - DATABASE_URL=postgresql://glowcast:changeme@postgres:5432/glowcast
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command:
      - uvicorn
      - app.api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  dashboard:
    build: .
    container_name: glowcast-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./outputs:/app/outputs
    environment:
      - PYTHONPATH=/app
      - GLOWCAST_ENV=production
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
    command:
      - streamlit
      - run
      - app/dashboard/dashboard.py
      - --server.port
      - "8501"
      - --server.address
      - "0.0.0.0"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    container_name: glowcast-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=glowcast
      - POSTGRES_USER=glowcast
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowcast"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: glowcast-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
