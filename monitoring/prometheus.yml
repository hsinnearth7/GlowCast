global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # GlowCast API — Prometheus metrics endpoint
  - job_name: "glowcast-api"
    metrics_path: /api/metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["glowcast-api:8000"]
        labels:
          service: "glowcast"
          component: "api"

  # GlowCast API — Kubernetes service discovery (when in K8s)
  - job_name: "glowcast-api-k8s"
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - glowcast
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
        action: replace
        target_label: component

  # Node exporter (if deployed)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # MLflow (if metrics endpoint available)
  - job_name: "mlflow"
    scrape_interval: 30s
    static_configs:
      - targets: ["mlflow:5000"]
        labels:
          service: "mlflow"
    metrics_path: /metrics
