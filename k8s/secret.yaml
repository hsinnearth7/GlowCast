apiVersion: v1
kind: Secret
metadata:
  name: glowcast-secrets
  namespace: glowcast
  labels:
    app.kubernetes.io/name: glowcast
    app.kubernetes.io/component: secrets
type: Opaque
# Base64-encoded values — replace with real secrets via sealed-secrets or external-secrets-operator
# echo -n 'value' | base64
data:
  API_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE
  DATABASE_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
  REDIS_URL: REPLACE_WITH_BASE64_ENCODED_VALUE
