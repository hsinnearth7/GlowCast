apiVersion: apps/v1
kind: Deployment
metadata:
  name: glowcast-dashboard
  namespace: glowcast
  labels:
    app.kubernetes.io/name: glowcast
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glowcast
      app.kubernetes.io/component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glowcast
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: glowcast
      terminationGracePeriodSeconds: 30
      containers:
        - name: dashboard
          image: glowcast/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
              protocol: TCP
          envFrom:
            - configMapRef:
                name: glowcast-config
            - secretRef:
                name: glowcast-secrets
          env:
            - name: PYTHONPATH
              value: /app
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
            - name: STREAMLIT_SERVER_HEADLESS
              value: "true"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          command:
            - streamlit
            - run
            - app/dashboard/dashboard.py
            - --server.port
            - "8501"
            - --server.address
            - "0.0.0.0"
            - --server.headless
            - "true"
